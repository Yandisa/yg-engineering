{% extends 'base.html' %}
{% block title %}Admin Login – YG Engineering{% endblock %}
{% block content %}
<section style="min-height:80vh;display:flex;align-items:center;justify-content:center;background:#f4f4f8;padding:40px 16px;">
  <div style="background:#fff;border-radius:16px;padding:48px 40px;box-shadow:0 4px 30px rgba(0,0,0,0.10);width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:32px;">
      <img src="/static/images/logo.png" alt="YG Engineering" style="height:60px;margin-bottom:16px;display:block;margin-left:auto;margin-right:auto;">
      <h1 style="color:#0d0d1a;font-size:1.6rem;margin:0;">Admin Login</h1>
    </div>
    {% if form.errors %}
    <div style="background:#fff0f0;border:1px solid #ffcccc;border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#c00;font-size:0.9rem;">
      Invalid username or password. Please try again.
    </div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">
      <div style="margin-bottom:16px;">
        <label style="display:block;color:#444;font-size:0.9rem;margin-bottom:6px;font-weight:600;">Username</label>
        <input type="text" name="username" autofocus required
          style="width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:8px;font-size:1rem;box-sizing:border-box;">
      </div>
      <div style="margin-bottom:28px;">
        <label style="display:block;color:#444;font-size:0.9rem;margin-bottom:6px;font-weight:600;">Password</label>
        <input type="password" name="password" required
          style="width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:8px;font-size:1rem;box-sizing:border-box;">
      </div>
      <button type="submit"
        style="width:100%;background:#0d0d1a;color:#fff;padding:14px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;">
        Login
      </button>
    </form>
    <div style="text-align:center;margin-top:20px;">
      <a href="/" style="color:#888;font-size:0.85rem;text-decoration:none;">← Back to Website</a>
    </div>
  </div>
</section>
{% endblock %}
