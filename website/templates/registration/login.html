{% extends 'base.html' %}
{% block title %}Admin Login – YG Engineering{% endblock %}
{% block content %}
<section style="min-height:80vh;display:flex;align-items:center;justify-content:center;background:hsl(220,13%,9%);padding:40px 16px;">
  <div style="background:hsl(220,13%,11%);border:1px solid hsl(220,13%,20%);border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px hsl(220,13%,5%,0.6);">

    <div style="text-align:center;margin-bottom:32px;">
      <img src="/static/images/logo.png" alt="YG Engineering" style="height:60px;margin-bottom:16px;display:block;margin-left:auto;margin-right:auto;">
      <h1 style="font-family:'Orbitron',monospace;color:hsla(45,48%,56%,0.9);font-size:1.3rem;letter-spacing:2px;margin:0;">ADMIN LOGIN</h1>
    </div>

    {% if form.errors %}
    <div style="background:rgba(200,0,0,0.1);border:1px solid rgba(200,0,0,0.3);border-radius:8px;padding:12px 16px;margin-bottom:20px;color:#ff6b6b;font-size:0.9rem;font-family:'Rajdhani',sans-serif;">
      Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <div style="margin-bottom:16px;">
        <label style="display:block;color:hsl(0,0%,65%);font-size:0.85rem;margin-bottom:6px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;">USERNAME</label>
        <input type="text" name="username" autofocus required
          style="width:100%;padding:12px 14px;background:hsl(220,13%,15%);border:1px solid hsl(220,13%,25%);border-radius:8px;font-size:1rem;box-sizing:border-box;color:hsl(0,0%,98%);font-family:'Rajdhani',sans-serif;outline:none;"
          onfocus="this.style.borderColor='hsla(45,48%,56%,0.7)'" onblur="this.style.borderColor='hsl(220,13%,25%)'">
      </div>

      <div style="margin-bottom:28px;">
        <label style="display:block;color:hsl(0,0%,65%);font-size:0.85rem;margin-bottom:6px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;">PASSWORD</label>
        <input type="password" name="password" required
          style="width:100%;padding:12px 14px;background:hsl(220,13%,15%);border:1px solid hsl(220,13%,25%);border-radius:8px;font-size:1rem;box-sizing:border-box;color:hsl(0,0%,98%);font-family:'Rajdhani',sans-serif;outline:none;"
          onfocus="this.style.borderColor='hsla(45,48%,56%,0.7)'" onblur="this.style.borderColor='hsl(220,13%,25%)'">
      </div>

      <button type="submit"
        style="width:100%;background:linear-gradient(135deg,hsl(45,93%,48%) 0%,hsl(45,100%,55%) 100%);color:hsl(220,13%,9%);padding:14px;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:1px;">
        LOGIN
      </button>
    </form>

    <div style="text-align:center;margin-top:20px;">
      <a href="/" style="color:hsl(0,0%,45%);font-size:0.85rem;text-decoration:none;font-family:'Rajdhani',sans-serif;">← Back to Website</a>
    </div>
  </div>
</section>
{% endblock %}
